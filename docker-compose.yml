version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: cic-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: cic-intranet
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cic-intranet"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cic-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://cic-postgres:5432/cic-intranet
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "1234"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: